name: keivo

services:
  ollama:
    image: ollama/ollama:${OLLAMA_IMAGE_TAG:-latest}
    restart: unless-stopped
    environment:
      OLLAMA_HOST: 0.0.0.0:11434
      OLLAMA_KEEP_ALIVE: ${OLLAMA_KEEP_ALIVE:-10m}
    volumes:
      - ollama_data:/root/.ollama
    networks:
      - model_net
      - ollama_egress
    security_opt:
      - no-new-privileges:true
    healthcheck:
      test: ["CMD", "ollama", "list"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 15s
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  model-pull:
    image: ollama/ollama:${OLLAMA_IMAGE_TAG:-latest}
    restart: "no"
    depends_on:
      ollama:
        condition: service_healthy
    environment:
      OLLAMA_HOST: http://ollama:11434
    command: ["pull", "${OLLAMA_MODEL:-qwen3:8b}"]
    networks:
      - model_net
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "2"

  keivo:
    build:
      context: ../..
      dockerfile: deploy/azure/Dockerfile
    restart: unless-stopped
    init: true
    depends_on:
      ollama:
        condition: service_healthy
      model-pull:
        condition: service_completed_successfully
    environment:
      APP_ENV: production
      AGENT_DATA_DIR: /app/data
      OLLAMA_BASE_URL: http://ollama:11434
      OLLAMA_MODEL: ${OLLAMA_MODEL:-qwen3:8b}
      OLLAMA_KEEP_ALIVE: ${OLLAMA_KEEP_ALIVE:-10m}
      OLLAMA_THINK: ${OLLAMA_THINK:-true}
      AGENT_MAX_OUTPUT_TOKENS: ${AGENT_MAX_OUTPUT_TOKENS:-8192}
      AGENT_CONTEXT_WINDOW: ${AGENT_CONTEXT_WINDOW:-32768}
      AGENT_TEMPERATURE: ${AGENT_TEMPERATURE:-0.55}
      AGENT_MAX_INPUT_CHARS: ${AGENT_MAX_INPUT_CHARS:-24000}
      AGENT_REQUEST_TIMEOUT: ${AGENT_REQUEST_TIMEOUT:-600}
      AGENT_USAGE_LIMIT_PER_HOUR: ${AGENT_USAGE_LIMIT_PER_HOUR:-60}
      AGENT_TRUST_PROXY: "1"
    volumes:
      - keivo_data:/app/data
    networks:
      - edge_net
      - model_net
    read_only: true
    tmpfs:
      - /tmp:size=64m,mode=1777
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/api/status', timeout=3).read()"]
      interval: 20s
      timeout: 5s
      retries: 5
      start_period: 20s
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    depends_on:
      keivo:
        condition: service_healthy
    environment:
      KEIVO_DOMAIN: ${KEIVO_DOMAIN:?Set KEIVO_DOMAIN in .env}
      ACME_EMAIL: ${ACME_EMAIL:?Set ACME_EMAIL in .env}
      KEIVO_AUTH_USER: ${KEIVO_AUTH_USER:?Set KEIVO_AUTH_USER in .env}
      KEIVO_AUTH_HASH: ${KEIVO_AUTH_HASH:?Set KEIVO_AUTH_HASH in .env}
    ports:
      - "80:80/tcp"
      - "443:443/tcp"
      - "443:443/udp"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    networks:
      - edge_net
    read_only: true
    tmpfs:
      - /tmp:size=32m,mode=1777
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    cap_add:
      - NET_BIND_SERVICE
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

networks:
  edge_net:
    driver: bridge
  model_net:
    driver: bridge
    internal: true
  ollama_egress:
    driver: bridge

volumes:
  keivo_data:
  ollama_data:
  caddy_data:
  caddy_config:
